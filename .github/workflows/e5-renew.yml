name: Auto Renew E5 (Caduceus) - Final

on:
  schedule:
    - cron: '30 2,14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      E5_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      E5_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      E5_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      E5_WEB_APP_PASSWORD: ${{ secrets.PASSWORD }}
      PORT: 8080

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: {python-version: '3.10'}
    - run: |
        pip install uvicorn quart httpx
        python main.py &
        sleep 15
        curl -X POST http://127.0.0.1:8080/call \
          -H "Content-Type: application/json" \
          -d "{\"password\": \"$E5_WEB_APP_PASSWORD\"}"
        sleep 30
        
    - name: Update Refresh Token
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        if [ -f new_token.txt ]; then
          gh secret set REFRESH_TOKEN -b"$(cat new_token.txt)" --repo ${{ github.repository }}
          echo "✅ Token updated successfully!"
        else
          echo "❌ new_token.txt not found. Check logs above."
          exit 1
        fi
