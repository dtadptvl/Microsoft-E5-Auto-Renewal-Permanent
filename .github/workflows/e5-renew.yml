name: Auto Renew E5 (Caduceus) - Set & Forget

on:
  schedule:
    - cron: '30 2,14 * * *' # Chạy tự động 2 lần/ngày
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      E5_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      E5_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      E5_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      E5_WEB_APP_PASSWORD: ${{ secrets.PASSWORD }}
      PORT: 8080

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uvicorn quart httpx

    - name: Run Server and Trigger API
      run: |
        python main.py &
        sleep 5
        
        curl -X POST http://127.0.0.1:8080/call \
          -H "Content-Type: application/json" \
          -d "{\"password\": \"$E5_WEB_APP_PASSWORD\"}"
          
        # Đợi 90 giây cho server gọi xong toàn bộ API của Microsoft
        sleep 90

    - name: Update Refresh Token to GitHub Secrets
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        if [ -f new_token.txt ]; then
          NEW_TOKEN=$(cat new_token.txt)
          # Sử dụng Github CLI để ghi đè Secret
          gh secret set REFRESH_TOKEN -b"$NEW_TOKEN" --repo ${{ github.repository }}
          echo "✅ Đã cập nhật Refresh Token mới vào Github Secrets thành công! Trượt hạn thêm 90 ngày."
        else
          echo "❌ Không tìm thấy file token mới. Vui lòng kiểm tra lại!"
          exit 1
        fi
